services:
  postgres:
    image: postgres:16-alpine
    container_name: telacta-postgres
    environment:
      POSTGRES_DB: telacta
      POSTGRES_USER: telacta
      POSTGRES_PASSWORD: telacta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telacta -d telacta"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.22-community
    container_name: telacta-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 256m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1;'"]
      interval: 15s
      timeout: 10s
      retries: 10

  cube:
    image: cubejs/cube:latest
    container_name: telacta-cube
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CUBEJS_DEV_MODE: "true"
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: postgres
      CUBEJS_DB_PORT: 5432
      CUBEJS_DB_NAME: telacta
      CUBEJS_DB_USER: telacta
      CUBEJS_DB_PASS: telacta
      CUBEJS_API_SECRET: telacta-dev-secret
      CUBEJS_SCHEMA_PATH: model
    ports:
      - "4000:4000"
    volumes:
      - ./cube:/cube/conf
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:4000/readyz', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: telacta-api
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://telacta:telacta@postgres:5432/telacta
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      CUBE_API_URL: http://cube:4000/cubejs-api/v1
      CUBE_API_SECRET: telacta-dev-secret
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10

  seed:
    build:
      context: .
      dockerfile: app/Dockerfile
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://telacta:telacta@postgres:5432/telacta
    command: ["python", "-m", "app.scripts.seed_data"]

volumes:
  postgres_data:
  neo4j_data:
